when:
  - event: [manual, push]

steps:
  - name: check-vars
    image: alpine
    commands:
      - "[ -n \"$IMAGE_TAG\" ] || (echo 'IMAGE_TAG not set, skipping deploy'; exit 78)"

  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - "kubectl set image deployment/audiblez-web audiblez-web=${IMAGE_NAME}:${IMAGE_TAG} -n ebook2audiobook"
      - "kubectl rollout status deployment/audiblez-web -n ebook2audiobook --timeout=300s"

  - name: notify
    image: woodpeckerci/plugin-slack
    settings:
      webhook:
        from_secret: slack-webhook-url
      channel: general
    when:
      - status: [success, failure]
